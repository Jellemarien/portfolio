    <header class="text-center container-fluid mt-5 blauw-color ">
        <h1>contact</h1> 
    </header>
    <div class="container">
        <div class="row">
            <main class="col-md-9 ">
                <section id="contact" class="row">
                    <div class="col-12 mb-3">
                        <h2 class="grijs-color ">Neem contact op</h2>
                    </div>
                    <form name="contact" method="POST" data-netlify="true" enctype="multipart/form-data" netlify>
                        <fieldset class="row g-3 mb-3 form-group grijs-color">
                            <div class="col-md-6 grijs-color">
                                <label  for="firstName" class="form-label">voornaam</label>
                                <input name="name" type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label for="lastName" class="form-label">achternaam</label>
                                <input name="lastName" type="text" class="form-control" id="lastName" required>
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label  for="email" class="form-label">email</label>
                                <input name="email" type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label  for="birthDate" class="form-label">geboortedatum</label>
                                <input name="birthDate" type="date" class="form-control" id="birthDate">
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label  for="mobile" class="form-label">mobiel <br></label>
                                <input name="mobile" type="tel" id="mobile" pattern="[0-9]{10}"
                                placeholder="0415161213" class="form-control form-control-sm" required>
                            </div>
                            <div class="col col-md-6 grijs-color">
                                <label  for="message" class="form-label">stel hier je vraag?</label>
                                <textarea name="message" class="form-control" id="message" rows="3"></textarea>
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label  for="formFile" class="form-label">bestand</label>
                                <input name="formFile" class="form-control" type="file" id="formFile">
                            </div>
                        </fieldset>
                        <div class="col-12">
                            <button type="submit" value="Upload" class="btn btn-light blauw-color">verzenden</button>
                        </div>
                    </form>
                    
                </section>
                
            </main>
            <aside class="col col-md-3 grijs-color">
