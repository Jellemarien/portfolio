                    <div class="col-12 mb-3">

                    <form action="#" method="post" netlify>
                        <fieldset class="row g-3 mb-3">
                            <div class="col-md-6 grijs-color">
                                <label for="firstName" class="form-label">voornaam</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label for="lastName" class="form-label">achternaam</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                            <div class="col grijs-color">
                                <label for="mobile" class="form-label">mobiel</label>
                                <input type="tel" class="form-control" id="mobile" pattern="[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}"

                            </div>
                            <div class="col grijs-color">
                                <label for="birthDate" class="form-label">geboortedatum</label>
                                <input type="date" class="form-control" id="birthDate">
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label for="exampleFormControlTextarea1" class="form-label">stel hier je vraag?</label>
                                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                            </div>
                            <div class="col-md-6 grijs-color">
                                <label for="formFile" class="form-label">bestand</label>
                                <input class="form-control" type="file" id="formFile">
                            </div>
                        </fieldset>
                        <div class="col-12">
                            <button type="submit" value="Upload" class="btn btn-primary">verzenden</button>
                        </div>
